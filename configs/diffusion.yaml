model:
  base: runwayml/stable-diffusion-v1-5
  lora_rank: 16
  lora_alpha: 32
  lora_targets: ["to_q", "to_k", "to_v", "to_out.0"]
  prediction_type: epsilon

data:
  train_manifest: data/accessibility_train.jsonl
  val_manifest: data/accessibility_val.jsonl
  image_size: 512
  variants: ["high_contrast", "simplified", "line_art"]
  batch_size: 4
  num_workers: 4

training:
  epochs: 8
  lr: 1.0e-4
  weight_decay: 1.0e-2
  warmup_steps: 500
  grad_accum_steps: 4
  mixed_precision: bf16
  gradient_checkpointing: true
  ema_decay: 0.9999
  seed: 42
  output_dir: runs/diffusion

fairness:
  enable: true
  attributes: ["skin_tone", "gender_presentation", "age_bucket"]
  weight: 0.15
  ema_window: 512

logging:
  log_every: 50
  val_every: 1000
  save_every: 2000
